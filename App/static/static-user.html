<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>App Users</title>

  </head>
  <body class="min-h-screen bg-slate-100 text-slate-800">
    <header class="bg-gradient-to-r from-indigo-700 to-indigo-500 text-white shadow-lg">
      <div class="mx-auto flex max-w-6xl flex-wrap items-center justify-between gap-3 px-4 py-4">
        <h1 class="text-xl font-semibold">App Users</h1>
        <nav class="flex flex-wrap items-center gap-2 text-sm font-medium">
          <a href="/" class="rounded-md px-3 py-2 transition hover:bg-white/15">Home</a>
          <a href="/users" class="rounded-md px-3 py-2 transition hover:bg-white/15">Users Jinja</a>
          <a href="/static/users" class="rounded-md px-3 py-2 transition hover:bg-white/15">Users JS</a>
        </nav>
      </div>
    </header>
    
    <main class="mx-auto w-full max-w-6xl px-4 py-8" id="content">
        <section class="space-y-6">
          <div class="rounded-xl bg-white p-6 shadow-sm ring-1 ring-slate-200">
            <p class="text-slate-600">
                This is table is rendered on the Client. JavaScript code requests the data from <a href="/api/users">/api/users</a> and writes it to this page.
            </p>
          </div>

          <div class="overflow-hidden rounded-xl bg-white shadow-sm ring-1 ring-slate-200">
            <table class="min-w-full divide-y divide-slate-200 text-sm">
              <thead class="bg-slate-50">
                <tr>
                  <th class="px-4 py-3 text-left font-semibold text-slate-700">ID</th>
                  <th class="px-4 py-3 text-left font-semibold text-slate-700">Username</th>
                </tr>
              </thead>
              <tbody id="result" class="divide-y divide-slate-100 bg-white"></tbody>
            </table>
          </div>
        </section>
    </main>

    <script src="main.js"></script>
  </body>
</html>
